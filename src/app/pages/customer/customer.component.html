<div class="customer-container">

    <h2>Customer Details</h2>

    <form>

        <input type="text"
               placeholder="Customer Name"
               [(ngModel)]="customerData.customer_name"
               name="customer_name">

        <input type="text"
               placeholder="Mobile Number"
               [(ngModel)]="customerData.mobile_no"
               name="mobile_no">

        <input type="text"
               placeholder="Email"
               [(ngModel)]="customerData.email"
               name="email">

        <textarea
            placeholder="Address"
            [(ngModel)]="customerData.address"
            name="address"></textarea>

        <input type="text"
               placeholder="City"
               [(ngModel)]="customerData.city"
               name="city">

        <input type="text"
               placeholder="State"
               [(ngModel)]="customerData.state"
               name="state">

        <input type="text"
               placeholder="Pincode"
               [(ngModel)]="customerData.pincode"
               name="pincode">

        <button type="button"
                (click)="saveCustomer()">
            Save Customer
        </button>

    </form>

</div>
